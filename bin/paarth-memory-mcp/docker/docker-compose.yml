# Opt-in Qdrant sidecar for PAARTH Memory-OS vector recall (Phase 5).
#
# The default install needs NONE of this — vector recall is gated behind
# PAARTH_MEMORY_VECTOR=on. Bring this up only when you opt in:
#
#   docker compose -f docker/docker-compose.yml up -d
#   curl -s localhost:6333/healthz        # -> "healthz check passed"
#
# Embeddings are produced in-process by the Python MCP server (Ollama →
# OpenRouter), so no embedding worker container is required here. Point the
# server at this instance with PAARTH_MEMORY_QDRANT_URL (defaults to
# http://127.0.0.1:6333).
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: paarth-memory-qdrant
    ports:
      - "127.0.0.1:6333:6333"   # REST + health
      - "127.0.0.1:6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  qdrant_storage:
